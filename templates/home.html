<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 智慧羽球教練</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }
    .hero {
      position: relative; width: 100%; height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f4c2a 100%);
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
    }
    .hero::before {
      content: '🏸';
      position: absolute; font-size: 40vw; opacity: .04;
      animation: spin 30s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hero-content { position: relative; z-index: 2; color: #fff; padding: 2rem; }
    .hero-badge { display: inline-block; background: rgba(22,163,74,.2); border: 1px solid rgba(22,163,74,.4);
      color: #4ade80; padding: .35rem 1rem; border-radius: 20px; font-size: .85rem; margin-bottom: 1.5rem; letter-spacing: 2px; }
    .hero h1 { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 900; line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, #86efac 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; }
    .hero p { font-size: 1.1rem; color: rgba(255,255,255,.7); margin-bottom: 2.5rem; max-width: 480px; margin-left: auto; margin-right: auto; }
    .btn-hero {
      display: inline-block; background: #16a34a; color: #fff;
      padding: .9rem 2.5rem; border-radius: 50px; font-size: 1.1rem; font-weight: 700;
      text-decoration: none; transition: all .3s; box-shadow: 0 4px 24px rgba(22,163,74,.4);
      margin: .4rem;
    }
    .btn-hero:hover { background: #15803d; color: #fff; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(22,163,74,.5); text-decoration: none; }
    .btn-hero-outline {
      display: inline-block; background: transparent; color: rgba(255,255,255,.9);
      border: 2px solid rgba(255,255,255,.3); padding: .9rem 2.5rem; border-radius: 50px;
      font-size: 1.1rem; font-weight: 500; text-decoration: none; transition: all .3s; margin: .4rem;
    }
    .btn-hero-outline:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,.08); text-decoration: none; }
    .stats { display: flex; justify-content: center; gap: 3rem; margin-top: 3rem; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 700; color: #4ade80; }
    .stat-label { font-size: .78rem; color: rgba(255,255,255,.5); letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <div class="hero-badge">🏸 AI POWERED BADMINTON COACH</div>
      <h1>AI 智慧<br>羽球教練</h1>
      <p>透過人工智慧辨識您的擊球動作，提供即時回饋與訓練進度追蹤</p>
      <div>
        <a href="/menu" class="btn-hero">開始訓練</a>
        <a href="/login" class="btn-hero-outline">登入帳號</a>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-num">6</div><div class="stat-label">球種辨識</div></div>
        <div class="stat"><div class="stat-num">AI</div><div class="stat-label">動作分析</div></div>
        <div class="stat"><div class="stat-num">即時</div><div class="stat-label">姿勢回饋</div></div>
      </div>
    </div>
  </div>
</body>
</html>
